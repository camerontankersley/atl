<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LaTeX Sandbox — Debugger</title>

<!-- KaTeX -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #080b12;
    --surface:  #0f1117;
    --surface2: #141720;
    --border:   #222637;
    --border2:  #2e3248;
    --accent:   #5a70ff;
    --accent2:  #8b9aff;
    --text:     #d4d8e8;
    --text-dim: #6b7080;
    --ok:       #3ecf8e;
    --err:      #e05555;
    --mono:     "JetBrains Mono", "Fira Code", "Cascadia Code", monospace;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: "DM Sans", system-ui, sans-serif;
    font-size: 14px;
    overflow: hidden;
  }

  #app {
    display: grid;
    grid-template-rows: 46px 1fr;
    grid-template-columns: 320px 1fr;
    grid-template-areas:
      "header header"
      "palette main";
    height: 100vh;
  }

  /* Header */
  #header {
    grid-area: header;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 0 18px;
  }
  #header h1 { font-size:15px; font-weight:600; letter-spacing:0.02em; color:var(--accent2); }
  #header h1 span { color:var(--text-dim); font-weight:400; }
  .badge {
    font-size:10px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase;
    background:#1e2340; color:var(--accent2); border:1px solid #2d3460;
    border-radius:4px; padding:2px 7px;
  }
  .spacer { flex:1; }
  #status-bar { font-size:11px; color:var(--text-dim); font-family:var(--mono); }
  #status-bar.ok  { color:var(--ok); }
  #status-bar.err { color:var(--err); }

  /* Palette column */
  #palette-col {
    grid-area: palette;
    border-right: 1px solid var(--border);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  #palette-col-header {
    padding:10px 14px 8px; font-size:10px; font-weight:700;
    letter-spacing:0.1em; text-transform:uppercase;
    color:var(--text-dim); border-bottom:1px solid var(--border); flex-shrink:0;
  }
  #latex-formatter { flex:1; overflow-y:auto; padding:10px; }
  #latex-formatter::-webkit-scrollbar { width:5px; }
  #latex-formatter::-webkit-scrollbar-track { background:transparent; }
  #latex-formatter::-webkit-scrollbar-thumb { background:#2a2d40; border-radius:3px; }

  /* Main column */
  #main-col {
    grid-area: main;
    display: grid;
    grid-template-rows: auto 1fr auto 1fr;
    overflow: hidden;
  }

  .pane-label {
    padding:8px 16px; font-size:10px; font-weight:700;
    letter-spacing:0.1em; text-transform:uppercase;
    color:var(--text-dim); border-bottom:1px solid var(--border);
    background:var(--surface); display:flex; align-items:center; gap:10px;
  }
  .pane-label .hint { font-size:10px; font-weight:400; text-transform:none; letter-spacing:0; color:#3a3e55; }
  .pane-label .flex { flex:1; }

  /* Input pane */
  #input-pane {
    background:var(--surface2); border-bottom:1px solid var(--border);
    position:relative; display:flex; flex-direction:column;
  }
  #latex-enter {
    flex:1; background:transparent; border:none; outline:none;
    color:#c8d0f0; font-family:var(--mono); font-size:14px;
    padding:14px 18px; resize:none; line-height:1.7; tab-size:2;
  }
  #latex-enter::placeholder { color:#30354a; }

  /* Render pane */
  #render-pane { overflow-y:auto; background:var(--bg); border-bottom:1px solid var(--border); }
  #render-pane::-webkit-scrollbar { width:5px; }
  #render-pane::-webkit-scrollbar-thumb { background:#1e2130; border-radius:3px; }
  #latex-render { min-height:100%; padding:20px 24px; font-size:18px; line-height:2; }

  /* KaTeX sizing */
  #latex-render .katex-display { font-size:20px; margin: 0.5em 0; }
  #latex-render .katex         { font-size:18px; }

  /* HTML source pane */
  #token-pane { overflow-y:auto; background:var(--surface2); }
  #token-pane::-webkit-scrollbar { width:5px; }
  #token-pane::-webkit-scrollbar-thumb { background:#1e2130; border-radius:3px; }
  #latex-tokens { padding:14px 18px; font-family:var(--mono); font-size:12px; color:#7880a8; white-space:pre; line-height:1.6; }

  /* Toolbar */
  .toolbar { display:flex; gap:6px; align-items:center; }
  .tbtn {
    background:#1a1e2e; border:1px solid var(--border2); border-radius:5px;
    color:var(--text-dim); cursor:pointer; font-size:11px; padding:3px 9px;
    transition:background 0.1s, color 0.1s;
  }
  .tbtn:hover  { background:#242840; color:var(--accent2); border-color:var(--accent); }
  .tbtn.active { background:#1e254a; color:var(--accent2); border-color:var(--accent); }

  /* Quick-insert chips */
  #quick-bar {
    display:flex; flex-wrap:wrap; gap:5px; padding:8px 18px;
    border-bottom:1px solid var(--border); background:var(--surface);
  }
  .qchip {
    background:#161a27; border:1px solid var(--border2); border-radius:4px;
    color:var(--text-dim); cursor:pointer; font-size:11px; padding:2px 8px;
    font-family:var(--mono); transition:background 0.1s, color 0.1s;
  }
  .qchip:hover { background:#22273c; color:var(--accent2); border-color:var(--accent); }

  /* Mode toggle */
  #mode-toggle { display:flex; gap:0; border:1px solid var(--border2); border-radius:5px; overflow:hidden; }
  .mode-btn {
    background:#1a1e2e; border:none; color:var(--text-dim); cursor:pointer;
    font-size:11px; padding:3px 10px; transition:background 0.1s, color 0.1s;
  }
  .mode-btn.active { background:#1e254a; color:var(--accent2); }

  /* HTML source syntax colours */
  .html-tag   { color:#5588cc; }
  .html-attr  { color:#88aadd; }
  .html-val   { color:#88ccaa; }
  .html-text  { color:#c0a880; }
</style>
</head>
<body>

<div id="app">

  <!-- Header -->
  <header id="header">
    <h1>LaTeX Sandbox <span>/ Debugger</span></h1>
    <span class="badge">KaTeX renderer</span>
    <div class="spacer"></div>
    <span id="status-bar">ready</span>
  </header>

  <!-- Palette column -->
  <aside id="palette-col">
    <div id="palette-col-header">Symbol Palette</div>
    <div id="latex-formatter" data-target-id="latex-enter"></div>
  </aside>

  <!-- Main column -->
  <main id="main-col">

    <div id="quick-bar"></div>

    <div class="pane-label">
      <span>LaTeX Input</span>
      <span class="hint">edit text to render</span>
      <span class="flex"></span>
      <div class="toolbar">
        <div id="mode-toggle">
          <button class="mode-btn active" id="btn-display">display</button>
          <button class="mode-btn"        id="btn-inline">inline</button>
          <button class="mode-btn"        id="btn-mixed">mixed</button>
        </div>
        <button class="tbtn" id="btn-clear">clear</button>
        <button class="tbtn" id="btn-copy-latex">copy LaTeX</button>
      </div>
    </div>

    <div id="input-pane">
      <textarea id="latex-enter" spellcheck="false" autocomplete="off" autocorrect="off"
        placeholder="Type LaTeX here, or click symbols in the palette…">\int_{-\infty}^{\infty} e^{-x^2} \, dx = \sqrt{\pi}</textarea>
    </div>

    <div class="pane-label">
      <span>Rendered Output</span>
      <span class="flex"></span>
      <div class="toolbar">
        <button class="tbtn" id="btn-copy-html">copy HTML</button>
        <button class="tbtn" id="btn-show-tokens">show HTML ▸</button>
      </div>
    </div>

    <div id="render-pane">
      <div id="latex-render"></div>
    </div>

  </main>
</div>

<!-- HTML source overlay -->
<div id="token-overlay" style="
  position:fixed;inset:0;background:rgba(8,11,18,0.88);z-index:10000;
  display:none;flex-direction:column;">
  <div class="pane-label" style="padding:12px 18px;background:#0f1117;border-bottom:1px solid #222637;">
    <span>Generated HTML</span>
    <span class="flex"></span>
    <button class="tbtn" id="btn-copy-html2">copy</button>
    <button class="tbtn" id="btn-close-tokens" style="margin-left:6px;">✕ close</button>
  </div>
  <div id="token-pane" style="flex:1;overflow-y:auto;">
    <div id="latex-tokens"></div>
  </div>
</div>

<!-- load test1.js first; if missing, fall back to katex_renderer.js -->
<script>
(function () {
  const s = document.createElement("script");
  s.src = "test1.js";
  s.onload = function () {
    console.log("Loaded test1.js");
  };
  s.onerror = function () {
    const fallback = document.createElement("script");
    fallback.src = "katex_renderer.js";
    fallback.onload = function () {
      console.log("Loaded katex_renderer.js");
    };
    document.head.appendChild(fallback);
  };
  document.head.appendChild(s);
})();
</script>

<script src="latex_sandbox_overrides.js"></script>
<script src="latex_formatter.js"></script>

<script>
(function () {
  "use strict";

  /* ------------------------------------------------------------------ */
  /*  Wait for KaTeX + renderer before doing anything                    */
  /* ------------------------------------------------------------------ */

  function init() {
    if (!window.katex) {
      setTimeout(init, 50);
      return;
    }
    if (!window.LatexRenderer || typeof window.LatexRenderer.render !== "function") {
      setTimeout(init, 50);
      return;
    }
    setup();
  }

  /* ------------------------------------------------------------------ */
  /*  Quick-insert chips                                                 */
  /* ------------------------------------------------------------------ */

  const QUICK = [
    { label: "frac",      latex: "\\frac{}{}" },
    { label: "sqrt",      latex: "\\sqrt{}" },
    { label: "sum",       latex: "\\sum_{i=1}^{n}" },
    { label: "int",       latex: "\\int_{a}^{b}" },
    { label: "lim",       latex: "\\lim_{x \\to \\infty}" },
    { label: "matrix",    latex: "\\begin{pmatrix} a & b \\\\ c & d \\end{pmatrix}" },
    { label: "cases",     latex: "\\begin{cases} f(x) & \\text{if } x > 0 \\\\ 0 & \\text{otherwise} \\end{cases}" },
    { label: "aligned",   latex: "\\begin{aligned} x &= a + b \\\\ y &= c + d \\end{aligned}" },
    { label: "mathbb R",  latex: "\\mathbb{R}" },
    { label: "mathcal L", latex: "\\mathcal{L}" },
    { label: "vec",       latex: "\\vec{x}" },
    { label: "hat",       latex: "\\hat{x}" },
    { label: "overline",  latex: "\\overline{x}" },
    { label: "boxed",     latex: "\\boxed{}" },
  ];

  const quickBar = document.getElementById("quick-bar");
  const ta       = document.getElementById("latex-enter");

  QUICK.forEach(q => {
    const chip = document.createElement("button");
    chip.className   = "qchip";
    chip.textContent = q.label;
    chip.title       = q.latex;
    chip.addEventListener("click", () => {
      if (window.LatexFormatter) window.LatexFormatter.insertIntoTarget(ta, q.latex);
    });
    quickBar.appendChild(chip);
  });

  /* ------------------------------------------------------------------ */
  /*  Mode toggle                                                       */
  /* ------------------------------------------------------------------ */

  let currentMode = "display"; // display | inline | mixed

  function setMode(m) {
    currentMode = m;
    ["display", "inline", "mixed"].forEach(id => {
      document.getElementById("btn-" + id).classList.toggle("active", id === m);
    });
    doRender();
  }

  document.getElementById("btn-display").addEventListener("click", () => setMode("display"));
  document.getElementById("btn-inline") .addEventListener("click", () => setMode("inline"));
  document.getElementById("btn-mixed")  .addEventListener("click", () => setMode("mixed"));

  /* ------------------------------------------------------------------ */
  /*  Core render function                                               */
  /* ------------------------------------------------------------------ */

  const output   = document.getElementById("latex-render");
  const statusEl = document.getElementById("status-bar");
  let _lastHtml  = "";

  function doRender() {
    const raw = ta.value;
    const t0  = performance.now();
    try {
      let raw_wrapped;
      if      (currentMode === "display") raw_wrapped = "\\[" + raw + "\\]";
      else if (currentMode === "inline")  raw_wrapped = "$"   + raw + "$";
      else                                raw_wrapped = raw;

      const result = window.LatexRenderer.render(raw_wrapped, { static: true });

      const html     = result.html     || result;
      const finalize = result.finalize || (() => {});

      _lastHtml        = html;
      output.innerHTML = html;
      finalize();

      const dt = (performance.now() - t0).toFixed(1);
      statusEl.textContent = `OK  ${dt} ms  ${html.length} chars`;
      statusEl.className   = "ok";

      if (document.getElementById("token-overlay").style.display !== "none") showTokens();

    } catch (err) {
      output.innerHTML     = `<span style="color:var(--err);font-family:monospace">Error: ${escHtml(String(err))}</span>`;
      statusEl.textContent = "Error: " + String(err);
      statusEl.className   = "err";
    }
  }

  function escHtml(s) {
    return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  /* ------------------------------------------------------------------ */
  /*  Render trigger                                                     */
  /* ------------------------------------------------------------------ */

  ta.addEventListener("input", doRender);

  /* ------------------------------------------------------------------ */
  /*  Utility buttons                                                    */
  /* ------------------------------------------------------------------ */

  document.getElementById("btn-clear").addEventListener("click", () => {
    ta.value = "";
    ta.dispatchEvent(new Event("input", { bubbles: true }));
    ta.focus();
  });

  document.getElementById("btn-copy-latex").addEventListener("click", () => {
    navigator.clipboard.writeText(ta.value)
      .then(() => flash(document.getElementById("btn-copy-latex"), "copied!"));
  });

  document.getElementById("btn-copy-html").addEventListener("click", () => {
    navigator.clipboard.writeText(_lastHtml)
      .then(() => flash(document.getElementById("btn-copy-html"), "copied!"));
  });

  /* ------------------------------------------------------------------ */
  /*  HTML source overlay                                                */
  /* ------------------------------------------------------------------ */

  const overlay   = document.getElementById("token-overlay");
  const tokensDiv = document.getElementById("latex-tokens");

  function showTokens() {
    tokensDiv.innerHTML = syntaxHighlightHtml(_lastHtml);
  }

  document.getElementById("btn-show-tokens") .addEventListener("click", () => { overlay.style.display = "flex"; showTokens(); });
  document.getElementById("btn-close-tokens").addEventListener("click", () => { overlay.style.display = "none"; });
  document.getElementById("btn-copy-html2")  .addEventListener("click", () => {
    navigator.clipboard.writeText(_lastHtml)
      .then(() => flash(document.getElementById("btn-copy-html2"), "copied!"));
  });

  function syntaxHighlightHtml(html) {
    return escHtml(formatHtml(html))
      .replace(/(&lt;\/?)([\w-]+)/g,  '<span class="html-tag">$1$2</span>')
      .replace(/([\w-]+)=&quot;/g,    '<span class="html-attr">$1</span>=<span class="html-val">&quot;')
      .replace(/&quot;(?=[\s/>])/g,   '&quot;</span>');
  }

  function formatHtml(html) {
    let formatted = "";
    let indent    = 0;
    const parts   = html.replace(/>\s*</g, "><").split(/(<[^>]+>)/);
    for (const part of parts) {
      if (!part.trim()) continue;
      if (part.startsWith("</")) {
        indent = Math.max(0, indent - 1);
        formatted += "  ".repeat(indent) + part + "\n";
      } else if (part.startsWith("<") && !part.endsWith("/>") && !part.includes("</") && !part.startsWith("<!")) {
        formatted += "  ".repeat(indent) + part + "\n";
        if (!part.startsWith("<br") && !part.startsWith("<input") && !part.startsWith("<link") && !part.startsWith("<meta"))
          indent++;
      } else if (part.startsWith("<") && (part.endsWith("/>") || part.startsWith("<!"))) {
        formatted += "  ".repeat(indent) + part + "\n";
      } else {
        if (part.trim()) formatted += "  ".repeat(indent) + part + "\n";
      }
    }
    return formatted;
  }

  /* ------------------------------------------------------------------ */
  /*  Flash helper                                                       */
  /* ------------------------------------------------------------------ */

  function flash(el, txt) {
    const orig = el.textContent;
    el.textContent = txt;
    el.classList.add("active");
    setTimeout(() => { el.textContent = orig; el.classList.remove("active"); }, 1200);
  }

  /* ------------------------------------------------------------------ */
  /*  Boot                                                               */
  /* ------------------------------------------------------------------ */

  function setup() {
    doRender();
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", init);
  } else {
    init();
  }

})();
</script>
</body>
</html>
