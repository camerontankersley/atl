<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dev Launcher</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;700;800&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0f14;
    --panel: #13161e;
    --border: #1e2330;
    --accent: #5b9cf6;
    --accent2: #a78bfa;
    --green: #34d399;
    --red: #f87171;
    --text: #e2e8f0;
    --muted: #64748b;
    --hover: #1a1f2e;
  }

  body {
    font-family: 'JetBrains Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.4;
    pointer-events: none;
    z-index: 0;
  }

  .shell {
    position: relative;
    z-index: 1;
    max-width: 860px;
    margin: 0 auto;
    padding: 40px 24px 60px;
    width: 100%;
  }

  header { margin-bottom: 28px; }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 8px;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: 28px;
    font-weight: 800;
    color: var(--text);
    line-height: 1.2;
  }

  /* ── Breadcrumb ──────────────────────────────────────────── */

  .breadcrumb {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 2px;
    margin-top: 14px;
    padding: 8px 14px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 12px;
    color: var(--muted);
    overflow-x: auto;
    white-space: nowrap;
    min-height: 36px;
  }

  .breadcrumb-root {
    color: var(--accent);
    cursor: pointer;
    padding: 1px 4px;
    border-radius: 3px;
    transition: background 0.1s;
    flex-shrink: 0;
  }
  .breadcrumb-root:hover { background: var(--hover); }

  .breadcrumb-sep {
    color: var(--border);
    margin: 0 2px;
    user-select: none;
    flex-shrink: 0;
  }

  .breadcrumb-seg {
    color: var(--text);
    cursor: pointer;
    padding: 1px 4px;
    border-radius: 3px;
    transition: background 0.1s;
    flex-shrink: 0;
  }
  .breadcrumb-seg:hover { background: var(--hover); color: var(--accent); }
  .breadcrumb-seg.current { color: var(--muted); cursor: default; }
  .breadcrumb-seg.current:hover { background: transparent; color: var(--muted); }

  /* ── Toolbar ─────────────────────────────────────────────── */

  .toolbar {
    display: flex;
    gap: 10px;
    margin-top: 16px;
    margin-bottom: 16px;
    flex-wrap: wrap;
    align-items: center;
  }

  .search-wrap {
    flex: 1;
    min-width: 180px;
    position: relative;
  }

  .search-wrap svg {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    pointer-events: none;
  }

  input[type="search"] {
    width: 100%;
    padding: 8px 12px 8px 34px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
  }

  input[type="search"]:focus { border-color: var(--accent); }

  .filter-btn {
    padding: 7px 14px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .filter-btn:hover, .filter-btn.active {
    border-color: var(--accent);
    color: var(--accent);
  }

  .stop-btn {
    padding: 7px 14px;
    background: var(--panel);
    border: 1px solid var(--red);
    border-radius: 6px;
    color: var(--red);
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .stop-btn:hover {
    background: var(--red);
    color: #fff;
  }

  .stats {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 16px;
    display: flex;
    gap: 16px;
  }

  .stats b { color: var(--text); }

  /* ── File list ───────────────────────────────────────────── */

  .file-list {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .file-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 11px 16px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    transition: all 0.12s;
    color: inherit;
    animation: fadeUp 0.25s ease both;
  }

  .file-item.clickable { cursor: pointer; }
  .file-item.clickable:hover {
    background: var(--hover);
    border-color: var(--accent);
    transform: translateX(3px);
  }

  .file-item.dir {
    border-left: 3px solid var(--accent2);
    cursor: pointer;
  }
  .file-item.dir:hover {
    background: var(--hover);
    border-left-color: var(--accent);
    transform: translateX(3px);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .icon {
    width: 32px;
    height: 32px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    flex-shrink: 0;
  }

  .icon-html  { background: #7c3aed22; color: #a78bfa; }
  .icon-js    { background: #ca8a0422; color: #fbbf24; }
  .icon-css   { background: #0891b222; color: #38bdf8; }
  .icon-py    { background: #15803d22; color: #4ade80; }
  .icon-json  { background: #ea580c22; color: #fb923c; }
  .icon-img   { background: #be185d22; color: #f472b6; }
  .icon-dir   { background: #5b9cf622; color: #5b9cf6; }
  .icon-other { background: #1e2330;   color: var(--muted); }

  .file-name {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .file-ext {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 2px 7px;
    border-radius: 4px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--muted);
    flex-shrink: 0;
  }

  .file-size {
    font-size: 11px;
    color: var(--muted);
    flex-shrink: 0;
    min-width: 60px;
    text-align: right;
  }

  .open-btn {
    padding: 4px 12px;
    background: transparent;
    border: 1px solid var(--accent);
    border-radius: 5px;
    color: var(--accent);
    font-family: inherit;
    font-size: 11px;
    cursor: pointer;
    flex-shrink: 0;
    transition: all 0.12s;
  }

  .open-btn:hover {
    background: var(--accent);
    color: #fff;
  }

  .open-btn.py-launch {
    border-color: var(--green);
    color: var(--green);
  }

  .open-btn.py-launch:hover {
    background: var(--green);
    color: #000;
  }

  /* ── Toast ───────────────────────────────────────────────── */

  .launch-toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--panel);
    border: 1px solid var(--green);
    color: var(--green);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    padding: 8px 20px;
    border-radius: 6px;
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
    z-index: 200;
    white-space: nowrap;
  }
  .launch-toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
  .launch-toast.error {
    border-color: var(--red);
    color: var(--red);
  }

  .message {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-size: 14px;
  }

  .message .big { font-size: 40px; margin-bottom: 12px; }

  .pulse {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 1.2s infinite;
    margin-right: 6px;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.2; }
  }

  /* ── Preview overlay ─────────────────────────────────────── */

  .preview-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 100;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(6px);
    animation: fadeIn 0.15s ease;
  }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .preview-overlay.open { display: flex; flex-direction: column; }

  .preview-bar {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 20px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .preview-title {
    flex: 1;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .preview-close {
    padding: 5px 14px;
    background: var(--red);
    border: none;
    border-radius: 5px;
    color: #fff;
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
  }

  .preview-open-tab {
    padding: 5px 14px;
    background: var(--accent);
    border: none;
    border-radius: 5px;
    color: #fff;
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
  }

  iframe {
    flex: 1;
    border: none;
    background: #fff;
  }
</style>
</head>
<body>

<div class="shell">
  <header>
    <div class="logo">⚡ Dev Launcher</div>
    <h1>Project Files</h1>
    <nav class="breadcrumb" id="breadcrumb" aria-label="Directory path"></nav>
  </header>

  <div class="toolbar">
    <div class="search-wrap">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="search" id="searchInput" placeholder="Search files..." oninput="renderFiles()">
    </div>
    <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" onclick="setFilter('html', this)">HTML</button>
    <button class="filter-btn" onclick="setFilter('js', this)">JS</button>
    <button class="filter-btn" onclick="setFilter('css', this)">CSS</button>
    <button class="filter-btn" onclick="setFilter('py', this)">PY</button>
    <button class="filter-btn" onclick="loadFiles()">↻ Refresh</button>
    <button class="stop-btn" onclick="stopServer()">■ Stop Server</button>
  </div>

  <div class="stats" id="stats"></div>
  <div class="file-list" id="fileList">
    <div class="message"><div class="big">⏳</div>Loading files...</div>
  </div>
</div>

<!-- Preview overlay -->
<div class="preview-overlay" id="previewOverlay">
  <div class="preview-bar">
    <span class="preview-title" id="previewTitle"></span>
    <button class="preview-open-tab" onclick="openInTab()">Open in new tab ↗</button>
    <button class="preview-close" onclick="closePreview()">✕ Close</button>
  </div>
  <iframe id="previewFrame" sandbox="allow-scripts allow-same-origin allow-forms allow-modals"></iframe>
</div>

<!-- Toast notification -->
<div class="launch-toast" id="launchToast"></div>

<script>
  // ── State ──────────────────────────────────────────────────────────────────
  let allFiles      = [];
  let currentDir    = '';          // relative path from root, '' = root
  let currentFilter = 'all';
  let currentFileUrl = '';

  const ROOT_LABEL   = 'C:\\Users\\hp\\python3\\pdf_editor3';
  const RUNNABLE     = ['.html', '.htm', '.js', '.mjs'];
  const LAUNCHABLE   = ['.py'];
  const EXT_ICONS = {
    '.html': ['icon-html', '◈'],
    '.htm':  ['icon-html', '◈'],
    '.js':   ['icon-js',   'JS'],
    '.mjs':  ['icon-js',   'JS'],
    '.css':  ['icon-css',  'CS'],
    '.py':   ['icon-py',   'PY'],
    '.json': ['icon-json', '{}'],
    '.png':  ['icon-img',  '🖼'],
    '.jpg':  ['icon-img',  '🖼'],
    '.jpeg': ['icon-img',  '🖼'],
    '.gif':  ['icon-img',  '🖼'],
    '.svg':  ['icon-img',  '⬡'],
  };

  // ── Helpers ────────────────────────────────────────────────────────────────

  function fmtSize(bytes) {
    if (bytes == null) return '';
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / 1024 / 1024).toFixed(1) + ' MB';
  }

  function showToast(msg, isError) {
    const t = document.getElementById('launchToast');
    t.textContent = msg;
    t.classList.toggle('error', !!isError);
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }

  // ── Breadcrumb ─────────────────────────────────────────────────────────────

  function renderBreadcrumb() {
    const nav = document.getElementById('breadcrumb');
    nav.innerHTML = '';

    // Root crumb
    const root = document.createElement('span');
    root.className = 'breadcrumb-root';
    root.textContent = '📁 ' + ROOT_LABEL;
    root.title = 'Go to root';
    root.onclick = () => navigateTo('');
    nav.appendChild(root);

    if (!currentDir) return;

    const segments = currentDir.split('/');
    segments.forEach((seg, idx) => {
      const sep = document.createElement('span');
      sep.className = 'breadcrumb-sep';
      sep.textContent = ' › ';
      nav.appendChild(sep);

      const span = document.createElement('span');
      const isLast = idx === segments.length - 1;
      span.className = 'breadcrumb-seg' + (isLast ? ' current' : '');
      span.textContent = seg;
      if (!isLast) {
        const targetPath = segments.slice(0, idx + 1).join('/');
        span.onclick = () => navigateTo(targetPath);
        span.title = 'Navigate to ' + targetPath;
      }
      nav.appendChild(span);
    });
  }

  // ── Navigation ─────────────────────────────────────────────────────────────

  async function navigateTo(dirPath) {
    currentDir = dirPath;
    document.getElementById('searchInput').value = '';
    renderBreadcrumb();
    await loadFiles();
  }

  // ── Data loading ───────────────────────────────────────────────────────────

  async function loadFiles() {
    document.getElementById('fileList').innerHTML =
      '<div class="message"><div class="big">⏳</div>Loading...</div>';
    try {
      const url = '/api/files' + (currentDir ? '?path=' + encodeURIComponent(currentDir) : '');
      const res  = await fetch(url);
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      allFiles = data.entries;
      renderFiles();
    } catch(e) {
      document.getElementById('fileList').innerHTML =
        `<div class="message"><div class="big">⚠️</div>Could not load files.<br><br><small>${e.message}</small></div>`;
    }
  }

  // ── Filtering / rendering ──────────────────────────────────────────────────

  function setFilter(ext, btn) {
    currentFilter = ext;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderFiles();
  }

  function renderFiles() {
    const query = document.getElementById('searchInput').value.toLowerCase();
    let files = allFiles || [];

    if (currentFilter !== 'all')
      files = files.filter(f => f.ext === '.' + currentFilter);

    if (query)
      files = files.filter(f => f.name.toLowerCase().includes(query));

    const dirs = files.filter(f => f.isDir).length;
    const fls  = files.filter(f => !f.isDir).length;
    document.getElementById('stats').innerHTML =
      `<span><b>${fls}</b> files</span><span><b>${dirs}</b> folders</span>
       <span style="margin-left:auto"><span class="pulse"></span>Server running</span>`;

    const list = document.getElementById('fileList');

    if (files.length === 0) {
      list.innerHTML = `<div class="message"><div class="big">🔍</div>No files match.</div>`;
      return;
    }

    list.innerHTML = '';

    // "Up" row when inside a subfolder
    if (currentDir && !query) {
      const upSegments = currentDir.split('/');
      upSegments.pop();
      const parentPath = upSegments.join('/');

      const upItem = document.createElement('div');
      upItem.className = 'file-item dir';
      upItem.style.opacity = '0.7';
      upItem.innerHTML = `
        <div class="icon icon-dir">↑</div>
        <span class="file-name">.. (up a level)</span>
        <span class="file-ext">folder</span>
        <span class="file-size"></span>
      `;
      upItem.onclick = () => navigateTo(parentPath);
      list.appendChild(upItem);
    }

    files.forEach((f, i) => {
      const [iconCls, iconTxt] = f.isDir
        ? ['icon-dir', '📁']
        : (EXT_ICONS[f.ext] || ['icon-other', f.ext.slice(1, 3).toUpperCase() || '?']);

      const canRun    = RUNNABLE.includes(f.ext);
      const canLaunch = LAUNCHABLE.includes(f.ext);
      const filePath  = f.path;   // relative path from root, e.g. "subdir/file.js"
      const fileUrl   = `/files/${encodeURIComponent(filePath).replace(/%2F/g, '/')}`;
      const runUrl    = `/run/${encodeURIComponent(filePath).replace(/%2F/g, '/')}`;
      const previewUrl = canRun ? (f.ext.match(/\.html?/) ? fileUrl : runUrl) : fileUrl;

      let actionBtn = '';
      if (!f.isDir) {
        if (canLaunch) {
          actionBtn = `<button class="open-btn py-launch" onclick="launchPy(event,'${filePath.replace(/'/g, "\\'")}')">▶ Launch</button>`;
        } else {
          actionBtn = `<button class="open-btn" onclick="openFile(event,'${previewUrl.replace(/'/g, "\\'")}','${filePath.replace(/'/g, "\\'")}',${canRun})">
            ${canRun ? '▶ Run' : '👁 View'}
          </button>`;
        }
      }

      const item = document.createElement('div');
      item.className = 'file-item' + (f.isDir ? ' dir' : ' clickable');
      item.style.animationDelay = (i * 25) + 'ms';
      item.innerHTML = `
        <div class="icon ${iconCls}">${iconTxt}</div>
        <span class="file-name">${f.name}</span>
        <span class="file-ext">${f.isDir ? 'folder' : (f.ext.slice(1) || 'file')}</span>
        <span class="file-size">${fmtSize(f.size)}</span>
        ${actionBtn}
      `;

      if (f.isDir) {
        item.onclick = () => navigateTo(f.path);
      }

      list.appendChild(item);
    });
  }

  // ── Actions ────────────────────────────────────────────────────────────────

  async function launchPy(event, filePath) {
    event.stopPropagation();
    const btn = event.currentTarget;
    btn.textContent = '…';
    btn.disabled = true;
    try {
      const res  = await fetch('/api/run-script?file=' + encodeURIComponent(filePath));
      const data = await res.json();
      if (data.ok) {
        showToast('▶ Launched ' + filePath.split('/').pop());
      } else {
        showToast('✕ ' + (data.error || 'Launch failed'), true);
      }
    } catch(e) {
      showToast('✕ ' + e.message, true);
    } finally {
      btn.textContent = '▶ Launch';
      btn.disabled = false;
    }
  }

  function openFile(event, url, name, canRun) {
    event.stopPropagation();
    currentFileUrl = url;
    document.getElementById('previewTitle').textContent = name;
    document.getElementById('previewFrame').src = url;
    document.getElementById('previewOverlay').classList.add('open');
  }

  function closePreview() {
    document.getElementById('previewOverlay').classList.remove('open');
    document.getElementById('previewFrame').src = '';
  }

  function openInTab() {
    window.open(currentFileUrl, '_blank');
  }

  async function stopServer() {
    try { await fetch('/api/shutdown'); } catch {}
    window.close();
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closePreview();
  });

  // ── Init ───────────────────────────────────────────────────────────────────
  renderBreadcrumb();
  loadFiles();
</script>
</body>
</html>
